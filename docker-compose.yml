# =============================================
# VOCABMASTER AI — DOCKER COMPOSE
# =============================================
# Usage:
#   docker compose up -d
#   docker compose down
#
# Requires a .env file with DATABASE_URL and secrets
# =============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vocabmaster-ai
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Uncomment if using a local PostgreSQL container:
